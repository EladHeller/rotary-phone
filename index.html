<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="טלפון חוגה">
  <meta name="theme-color" content="#e8e0d0">
  <title>טלפון חוגה</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #e8e0d0;
      font-family: 'Special Elite', serif;
      overscroll-behavior: none;
      touch-action: none;
    }
    .wrap {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100dvh;
      background: #e8e0d0; padding: 1.5rem 1rem;
    }
    .display {
      font-size: 26px; letter-spacing: 0.2em; color: #222;
      background: #f5f0e8; border: 1.5px solid #b0a080; border-radius: 4px;
      padding: 8px 24px; min-width: 200px; text-align: center;
      min-height: 48px; margin-bottom: 1.2rem;
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.15);
      font-family: 'Special Elite', serif;
    }
    .svg-wrap { width: 100%; max-width: 340px; user-select: none; cursor: default; }
    .actions { display: flex; gap: 12px; margin-top: 1.2rem; }
    .btn {
      font-family: 'Special Elite', serif; font-size: 13px;
      letter-spacing: 0.08em; padding: 9px 18px; border-radius: 4px;
      border: 1.5px solid; cursor: pointer; text-decoration: none;
      display: inline-flex; align-items: center; gap: 6px;
      transition: opacity 0.15s; background: transparent;
    }
    .btn:hover { opacity: 0.75; }
    .btn-call { color: #1a6a10; border-color: #2a8a20; background: #eaf5e8; }
    .btn-clear { color: #8a2010; border-color: #aa3020; background: #f5eae8; }
    .btn-mute { color: #5a5040; border-color: #8a8070; background: #f0ede8; font-size: 16px; padding: 9px 14px; }
    .status { font-size: 12px; color: #7a7060; margin-top: 0.6rem; height: 16px; letter-spacing: 0.08em; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="display" id="display">_</div>
  <div class="svg-wrap">
    <svg id="dialSvg" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg" style="width:100%;touch-action:none;">
      <circle cx="160" cy="160" r="155" fill="#f0e8d2" stroke="#c8ba90" stroke-width="5"/>
      <circle cx="160" cy="160" r="142" fill="rgba(215,205,180,0.45)" stroke="rgba(170,155,120,0.6)" stroke-width="1.5"/>
      <circle cx="160" cy="160" r="50" fill="#2060b0" stroke="#1040a0" stroke-width="1.5"/>
      <circle cx="160" cy="160" r="46" fill="none" stroke="#4080d0" stroke-width="0.8"/>
      <text x="160" y="156" text-anchor="middle" fill="white" font-size="11" font-family="Arial" font-weight="bold">בזק</text>
      <text x="160" y="170" text-anchor="middle" fill="rgba(255,255,255,0.75)" font-size="9" font-family="Arial">☎</text>
      <circle cx="160" cy="295" r="8" fill="#888070" stroke="#a09080" stroke-width="2"/>
      <g id="holesGroup"></g>
    </svg>
  </div>
  <div class="actions">
    <a class="btn btn-call" id="callBtn" style="display:none" href="#">📞 התקשר</a>
    <button class="btn btn-clear" id="clearBtn">✕ נקה</button>
    <button class="btn btn-mute" id="muteBtn">🔊</button>
  </div>
  <div class="status" id="status">הכנס אצבע לחור וגרור עם השעון</div>
</div>

<script>
let audioCtx=null, muted=false;
function getCtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
function playTick(vol=0.35){
  if(muted) return;
  const ctx=getCtx();
  const buf=ctx.createBuffer(1,ctx.sampleRate*0.018,ctx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,3);
  const src=ctx.createBufferSource(); src.buffer=buf;
  const hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=1200;
  const g=ctx.createGain(); g.gain.setValueAtTime(vol,ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.018);
  src.connect(hp); hp.connect(g); g.connect(ctx.destination); src.start();
}
function playReturn(n,ms){
  if(muted) return;
  for(let i=0;i<n;i++) setTimeout(()=>playTick(0.22),i*(ms/n)*0.85);
  setTimeout(()=>{
    if(muted) return;
    const c=getCtx();
    const buf=c.createBuffer(1,c.sampleRate*0.04,c.sampleRate);
    const d=buf.getChannelData(0);
    for(let j=0;j<d.length;j++) d[j]=(Math.random()*2-1)*Math.pow(1-j/d.length,2)*0.7;
    const src=c.createBufferSource(); src.buffer=buf;
    const lp=c.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=800;
    const g=c.createGain(); g.gain.setValueAtTime(0.6,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.04);
    src.connect(lp); lp.connect(g); g.connect(c.destination); src.start();
  },ms*0.9);
}

const DCX=160, DCY=160, ORBIT=110, HOLE_R=14;
const PEG_ANGLE=90;
const angle0=115, angle1=330;
const totalSpan=(angle1-angle0+360)%360;
const step=totalSpan/9;
const digitOrder=['0','9','8','7','6','5','4','3','2','1'];
const holeAngles=[];
const holesGroup=document.getElementById('holesGroup');
const dialSvg=document.getElementById('dialSvg');

digitOrder.forEach((d,i)=>{
  const angleDeg=(angle0+step*i+360)%360;
  holeAngles.push(angleDeg);
  const ar=angleDeg*Math.PI/180;
  const hx=DCX+ORBIT*Math.cos(ar);
  const hy=DCY+ORBIT*Math.sin(ar);
  const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');
  circle.setAttribute('cx',hx); circle.setAttribute('cy',hy);
  circle.setAttribute('r',HOLE_R); circle.setAttribute('fill','#f0ebe0');
  circle.setAttribute('stroke','#999080'); circle.setAttribute('stroke-width',1.5);
  holesGroup.appendChild(circle);
  const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
  txt.setAttribute('x',hx); txt.setAttribute('y',hy+5);
  txt.setAttribute('text-anchor','middle'); txt.setAttribute('fill','#333');
  txt.setAttribute('font-size',13); txt.setAttribute('font-family','Special Elite, serif');
  txt.setAttribute('pointer-events','none'); txt.textContent=d;
  holesGroup.appendChild(txt);
});

let number='', isAnimating=false;
let dragging=false, activeHoleIndex=-1;
let currentRotation=0;
let prevPointerAngle=0;
let lastTickRotation=0;
const TICK_INTERVAL=20;

const display=document.getElementById('display');
const callBtn=document.getElementById('callBtn');
const clearBtn=document.getElementById('clearBtn');
const statusEl=document.getElementById('status');
const muteBtn=document.getElementById('muteBtn');

muteBtn.addEventListener('click',()=>{ muted=!muted; muteBtn.textContent=muted?'🔇':'🔊'; });

function getSVGPoint(e){
  const pt=dialSvg.createSVGPoint();
  const src=e.touches?e.touches[0]:e;
  pt.x=src.clientX; pt.y=src.clientY;
  return pt.matrixTransform(dialSvg.getScreenCTM().inverse());
}

function pointAngle(p){
  return (Math.atan2(p.y-DCY, p.x-DCX)*180/Math.PI+360)%360;
}

function findHole(p){
  for(let i=0;i<holeAngles.length;i++){
    const a=((holeAngles[i]+currentRotation)*Math.PI/180);
    const hx=DCX+ORBIT*Math.cos(a);
    const hy=DCY+ORBIT*Math.sin(a);
    const dx=p.x-hx, dy=p.y-hy;
    if(Math.sqrt(dx*dx+dy*dy)<HOLE_R*1.8) return i;
  }
  return -1;
}

function onPointerDown(e){
  if(isAnimating) return;
  const p=getSVGPoint(e);
  const hi=findHole(p);
  if(hi<0) return;
  e.preventDefault();
  dragging=true;
  activeHoleIndex=hi;
  currentRotation=0;
  prevPointerAngle=pointAngle(p);
  lastTickRotation=0;
  statusEl.textContent=`גורר ${digitOrder[hi]}...`;
}

function onPointerMove(e){
  if(!dragging||isAnimating) return;
  e.preventDefault();
  const p=getSVGPoint(e);
  const nowAngle=pointAngle(p);

  // Incremental delta, normalized to [-180, 180]
  let delta=nowAngle-prevPointerAngle;
  if(delta>180) delta-=360;
  if(delta<-180) delta+=360;

  // Only accumulate CW (positive) movement
  if(delta>0){
    const maxRot=((PEG_ANGLE-holeAngles[activeHoleIndex])+360)%360;
    currentRotation=Math.min(currentRotation+delta, maxRot);
    holesGroup.style.transform=`rotate(${currentRotation}deg)`;
    holesGroup.style.transformOrigin=`${DCX}px ${DCY}px`;
    const ticksPassed=Math.floor(currentRotation/TICK_INTERVAL);
    const ticksLast=Math.floor(lastTickRotation/TICK_INTERVAL);
    if(ticksPassed>ticksLast) playTick(0.3);
    lastTickRotation=currentRotation;
  }

  prevPointerAngle=nowAngle;
}

function onPointerUp(){
  if(!dragging) return;
  dragging=false;
  const rotReached=currentRotation;
  const maxRot=((PEG_ANGLE-holeAngles[activeHoleIndex])+360)%360;
  const digit=digitOrder[activeHoleIndex];
  const dialed=rotReached>=maxRot*0.85;

  isAnimating=true;
  const retDur=150+rotReached*0.5;
  const numTicks=Math.max(1,Math.round(rotReached/TICK_INTERVAL));
  if(dialed) playReturn(numTicks, retDur);

  const startRot=rotReached;
  const t0=performance.now();
  const easeOut=t=>1-Math.pow(1-t,3);
  function back(now){
    const p=Math.min((now-t0)/retDur,1);
    const rot=startRot*(1-easeOut(p));
    holesGroup.style.transform=`rotate(${rot}deg)`;
    holesGroup.style.transformOrigin=`${DCX}px ${DCY}px`;
    if(p<1){requestAnimationFrame(back);return;}
    holesGroup.style.transform='';
    currentRotation=0;
    isAnimating=false;
    if(dialed){ number+=digit; updateDisplay(); }
    else {
      statusEl.textContent='לא הגעת לסוף — נסה שוב';
      setTimeout(()=>{ if(!dragging) statusEl.textContent='הכנס אצבע לחור וגרור עם השעון'; },1500);
    }
  }
  requestAnimationFrame(back);
  activeHoleIndex=-1;
}

dialSvg.addEventListener('mousemove', e => {
  if(dragging||isAnimating) return;
  const p=getSVGPoint(e);
  const hi=findHole(p);
  dialSvg.style.cursor = hi>=0 ? 'pointer' : 'default';
});
dialSvg.addEventListener('mouseleave', () => { if(!dragging) dialSvg.style.cursor='default'; });
dialSvg.addEventListener('mousedown',onPointerDown);
window.addEventListener('mousemove',onPointerMove);
window.addEventListener('mouseup',onPointerUp);
dialSvg.addEventListener('touchstart',onPointerDown,{passive:false});
window.addEventListener('touchmove',onPointerMove,{passive:false});
window.addEventListener('touchend',onPointerUp);

function updateDisplay(){
  display.textContent=number||'_';
  if(number.length>0){
    callBtn.style.display='inline-flex'; callBtn.href='tel:'+number;
    statusEl.textContent=number.length>=7?'לחץ על ירוק להתקשר':'המשך לחייג...';
  } else {
    callBtn.style.display='none';
    statusEl.textContent='הכנס אצבע לחור וגרור עם השעון';
  }
}
clearBtn.addEventListener('click',()=>{ number=''; updateDisplay(); });
callBtn.addEventListener('click',e=>{ if(!number)e.preventDefault(); });
</script>
</body>
</html>
